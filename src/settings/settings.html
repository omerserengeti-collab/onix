<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onix Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="header">
    <button class="back-btn" id="back-btn" onclick="window.onix.closeWindow()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
      </svg>
    </button>
    <h1 class="title">Settings</h1>
    <div class="header-spacer"></div>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="music">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
      <span>Music</span>
    </div>
    <div class="tab" data-tab="apps">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <span>Websites</span>
    </div>
    <div class="tab" data-tab="settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span>Settings</span>
    </div>
  </div>

  <!-- Music Tab -->
  <div class="tab-content active" id="tab-music">
    <div class="section-card">
      <label class="form-label" style="margin-bottom: 12px;">Music Service</label>
      <div class="service-grid">
        <button class="service-card selected" data-service="spotify" type="button">
          <svg class="service-logo" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 15c2.5-1 5.5-1 8 0"/>
            <path d="M7 12c3-1.5 7-1.5 10 0"/>
            <path d="M6.5 9c3.5-1.5 8.5-1.5 11 0"/>
          </svg>
          <span class="service-name">Spotify</span>
        </button>
        <button class="service-card" data-service="apple" type="button">
          <svg class="service-logo" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
          <span class="service-name">Apple Music</span>
        </button>
        <button class="service-card" data-service="youtube" type="button">
          <svg class="service-logo" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="4"/>
            <polygon points="10,8 16,12 10,16" fill="#fff" stroke="none"/>
          </svg>
          <span class="service-name">YouTube</span>
        </button>
        <button class="service-card" data-service="custom" type="button">
          <svg class="service-logo" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          <span class="service-name">Custom URL</span>
        </button>
      </div>
    </div>

    <div class="section-card">
      <label class="form-label">Song / Playlist Link</label>
      <select id="music-service" style="display:none;">
        <option value="spotify">Spotify</option>
        <option value="apple">Apple Music</option>
        <option value="youtube">YouTube</option>
        <option value="custom">Custom URL</option>
      </select>
      <input type="text" id="music-url" placeholder="Paste a Spotify track link...">

      <!-- Song Preview -->
      <div class="song-preview" id="song-preview" style="display:none; margin-top: 12px;">
        <img class="song-art" id="song-art" src="" alt="">
        <div class="song-info">
          <div class="song-title" id="song-title"></div>
          <div class="song-artist" id="song-artist"></div>
        </div>
        <div class="song-check">&#x2705;</div>
      </div>
    </div>
  </div>

  <!-- Apps Tab -->
  <div class="tab-content" id="tab-apps">
    <div class="section-card">
      <div class="form-group">
        <label class="form-label">Website URLs</label>
        <p class="form-hint">These websites will open automatically when a clap is detected</p>

        <div class="quick-picks">
          <button class="quick-pick-btn quick-link-btn" type="button" data-url="https://claude.ai" title="Claude">
            <svg class="qp-icon-svg" viewBox="0 0 24 24" width="28" height="28"><path d="M4.709 15.955l4.72-2.647.08-.23-.08-.128H9.2l-.79-.048-2.698-.073-2.339-.097-2.266-.122-.571-.121L0 11.784l.055-.352.48-.321.686.06 1.52.103 2.278.158 1.652.097 2.449.255h.389l.055-.157-.134-.098-.103-.097-2.358-1.596-2.552-1.688-1.336-.972-.724-.491-.364-.462-.158-1.008.656-.722.881.06.225.061.893.686 1.908 1.476 2.491 1.833.365.304.145-.103.019-.073-.164-.274-1.355-2.446-1.446-2.49-.644-1.032-.17-.619a2.97 2.97 0 01-.104-.729L6.283.134 6.696 0l.996.134.42.364.62 1.414 1.002 2.229 1.555 3.03.456.898.243.832.091.255h.158V9.01l.128-1.706.237-2.095.23-2.695.08-.76.376-.91.747-.492.584.28.48.685-.067.444-.286 1.851-.559 2.903-.364 1.942h.212l.243-.242.985-1.306 1.652-2.064.73-.82.85-.904.547-.431h1.033l.76 1.129-.34 1.166-1.064 1.347-.881 1.142-1.264 1.7-.79 1.36.073.11.188-.02 2.856-.606 1.543-.28 1.841-.315.833.388.091.395-.328.807-1.969.486-2.309.462-3.439.813-.042.03.049.061 1.549.146.662.036h1.622l3.02.225.79.522.474.638-.079.485-1.215.62-1.64-.389-3.829-.91-1.312-.329h-.182v.11l1.093 1.068 2.006 1.81 2.509 2.33.127.578-.322.455-.34-.049-2.205-1.657-.851-.747-1.926-1.62h-.128v.17l.444.649 2.345 3.521.122 1.08-.17.353-.608.213-.668-.122-1.374-1.925-1.415-2.167-1.143-1.943-.14.08-.674 7.254-.316.37-.729.28-.607-.461-.322-.747.322-1.476.389-1.924.315-1.53.286-1.9.17-.632-.012-.042-.14.018-1.434 1.967-2.18 2.945-1.726 1.845-.414.164-.717-.37.067-.662.401-.589 2.388-3.036 1.44-1.882.93-1.086-.006-.158h-.055L4.132 18.56l-1.13.146-.487-.456.061-.746.231-.243 1.908-1.312-.006.006z" fill="#D97757" fill-rule="nonzero"/></svg>
            <span class="qp-label">Claude</span>
          </button>
          <button class="quick-pick-btn quick-link-btn" type="button" data-url="https://chatgpt.com" title="ChatGPT">
            <img src="https://chatgpt.com/favicon.ico" alt="ChatGPT" class="qp-icon" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
            <span class="qp-fallback" style="display:none">💬</span>
            <span class="qp-label">ChatGPT</span>
          </button>
          <button class="quick-pick-btn quick-link-btn" type="button" data-url="https://gemini.google.com" title="Gemini">
            <svg class="qp-icon-svg" viewBox="0 0 24 24" width="28" height="28"><path d="M20.616 10.835a14.147 14.147 0 01-4.45-3.001 14.111 14.111 0 01-3.678-6.452.503.503 0 00-.975 0 14.134 14.134 0 01-3.679 6.452 14.155 14.155 0 01-4.45 3.001c-.65.28-1.318.505-2.002.678a.502.502 0 000 .975c.684.172 1.35.397 2.002.677a14.147 14.147 0 014.45 3.001 14.112 14.112 0 013.679 6.453.502.502 0 00.975 0c.172-.685.397-1.351.677-2.003a14.145 14.145 0 013.001-4.45 14.113 14.113 0 016.453-3.678.503.503 0 000-.975 13.245 13.245 0 01-2.003-.678z" fill="#3186FF"/></svg>
            <span class="qp-label">Gemini</span>
          </button>
          <button class="quick-pick-btn quick-link-btn" type="button" data-url="https://gmail.com" title="Gmail">
            <img src="https://ssl.gstatic.com/ui/v1/icons/mail/rfr/gmail.ico" alt="Gmail" class="qp-icon" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
            <span class="qp-fallback" style="display:none">📧</span>
            <span class="qp-label">Gmail</span>
          </button>
          <button class="quick-pick-btn quick-link-btn" type="button" data-url="https://calendar.google.com" title="Calendar">
            <img src="https://calendar.google.com/googlecalendar/images/favicons_2020q4/calendar_31.ico" alt="Calendar" class="qp-icon" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
            <span class="qp-fallback" style="display:none">📅</span>
            <span class="qp-label">Calendar</span>
          </button>
        </div>

        <div id="window-entries"></div>
      </div>
      <button class="add-window-btn" id="add-window-btn">+ Add another website</button>
    </div>
  </div>

  <!-- Settings Tab (merged Calibration + General) -->
  <div class="tab-content" id="tab-settings">
    <div class="section-card">
      <div class="form-group toggle-row">
        <label class="form-label">Launch at login</label>
        <label class="toggle">
          <input type="checkbox" id="launch-at-login">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="section-card">
      <div class="form-group" style="margin-bottom: 0;">
        <label class="form-label">Sensitivity fine-tuning: <span id="sensitivity-value">0.42</span></label>
        <input type="range" id="sensitivity-slider" min="0.1" max="1.0" step="0.01" value="0.42">
      </div>
    </div>

    <div class="section-card" id="calibration-idle">
      <div class="form-group">
        <p class="threshold-display">Current sensitivity: <span id="current-threshold">0.42</span></p>
      </div>
      <div class="waveform-wrap">
        <canvas id="waveform-canvas" width="520" height="120"></canvas>
      </div>
      <div class="form-group" style="margin-top: 20px; margin-bottom: 0;">
        <button class="primary-btn" id="recalibrate-btn">Re-calibrate</button>
      </div>
    </div>
    <div class="section-card" id="calibration-active" style="display: none;">
      <p class="calibration-prompt" id="calibration-prompt">Clap 3 times. Waiting for claps...</p>
      <div class="clap-dots" id="clap-dots">
        <span class="clap-dot" id="dot-0"></span>
        <span class="clap-dot" id="dot-1"></span>
        <span class="clap-dot" id="dot-2"></span>
      </div>
      <div class="waveform-wrap">
        <canvas id="waveform-canvas-active" width="520" height="120"></canvas>
      </div>
      <div class="form-group" style="margin-top: 20px; margin-bottom: 0;">
        <button class="secondary-btn" id="cancel-calibration-btn">Cancel</button>
      </div>
    </div>
    <div class="section-card" id="calibration-done" style="display: none;">
      <p class="threshold-display">New sensitivity: <span id="new-threshold">0.42</span></p>
      <div class="form-group" style="margin-top: 20px; margin-bottom: 0;">
        <button class="primary-btn" id="calibration-done-btn">Done</button>
      </div>
    </div>

    <div class="section-card danger-zone">
      <div class="form-group" style="margin-bottom: 0;">
        <button class="danger-btn" id="reset-all-btn">Reset all settings</button>
      </div>
    </div>
  </div>

  <div class="save-bar">
    <button class="save-btn" id="save-btn">Save Changes</button>
  </div>

  <script src="settings.js"></script>
</body>
</html>
