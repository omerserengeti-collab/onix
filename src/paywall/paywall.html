<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=480, height=520">
  <title>Onix — License</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="paywall.css">
</head>
<body>
  <div class="paywall-bg">
    <div class="card">
      <div class="lock-icon">&#x1F512;</div>
      <h1 class="title">You've used your free clap</h1>
      <p class="subtitle">Buy a license to keep using Onix</p>

      <button class="btn-buy" id="btn-buy">Buy a License &mdash; $12</button>

      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-text">or</span>
        <span class="divider-line"></span>
      </div>

      <p class="activate-label">Already bought? Paste your key here</p>

      <div class="key-row">
        <input type="text" class="input-text" id="license-key" placeholder="ONIX-XXXX-XXXX-XXXX">
        <button class="btn-activate" id="btn-activate">Activate</button>
      </div>

      <div class="status-message" id="status-message"></div>

      <a class="manage-link" id="manage-link" href="#">Manage your licenses</a>
    </div>
  </div>

  <script src="paywall.js"></script>
</body>
</html>
